<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Note Popup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="popup-body">
  <div class="popup-shell">
    <div class="popup-card">
      <div id="popupToast" class="toast hidden"></div>
      <div class="section-head">
        <div>
          <p class="eyebrow">Study Note</p>
          <h1 class="title popup-title">Ghi nhanh</h1>
          <p class="subtitle">Lưu note ngay mà không rời tab hiện tại.</p>
        </div>
      </div>

      <input id="popupTitle" class="capture-input" type="text" placeholder="Tiêu đề note" />
      <div class="capture-grid three-col compact-grid">
        <select id="popupTag" class="capture-input"></select>
        <select id="popupStatus" class="capture-input">
          <option value="Đang học">Đang học</option>
          <option value="Đã lưu">Đã lưu</option>
          <option value="Cần ôn">Cần ôn</option>
        </select>
        <input id="popupMastery" class="capture-input" type="number" min="0" max="100" value="60" />
      </div>
      <textarea id="popupContent" class="capture-textarea small" placeholder="Gõ nhanh điều vừa học được..."></textarea>
      <div class="capture-actions">
        <button class="btn btn-primary grow" id="popupSaveBtn">Lưu note</button>
        <button class="btn" id="openDashboardBtn">Mở dashboard</button>
      </div>

      <div class="card compact-card">
        <div class="section-head">
          <div>
            <p class="section-kicker">Review Queue</p>
            <h3 class="section-title small-title">Cần ôn sớm</h3>
          </div>
        </div>
        <div id="popupReviewList" class="stack-list compact-list"></div>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
